/* theme.css (inlined) */
/* =============================================================
 *  theme.css  —  공통 chrome(사이드바·헤더·푸터) 스타일
 *  app.js가 주입하는 .gx-* 요소를 스타일링합니다.
 *  (각 페이지의 기존 .sidebar/.header CSS는 className 교체로 미적용됨)
 * ============================================================= */

:root{
  --gx-navy:#1E3079; --gx-navy-2:#17235c;
  --gx-teal:#17B8B8; --gx-side-text:#B8C6DB;
  --gx-ink:#354052; --gx-sub:#6A798E; --gx-line:#E2E8F0;
}

/* ── Sidebar ── */
.gx-sidebar{
  width:210px; min-width:210px; height:100vh;
  background:var(--gx-navy); color:var(--gx-side-text);
  display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto;
  font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
}
.gx-logo{
  padding:16px 16px 14px; font-size:14px; font-weight:700; color:#fff;
  border-bottom:1px solid rgba(255,255,255,.10); display:flex; align-items:center; gap:8px;
}
.gx-logo-mark{ font-size:15px; }
.gx-menu{ flex:1; padding:8px 0; }
.gx-mi{
  display:flex; align-items:center; gap:6px;
  padding:9px 16px; font-size:12px; color:var(--gx-side-text);
  text-decoration:none; cursor:pointer;
}
.gx-mi:hover{ background:rgba(255,255,255,.08); color:#fff; }
.gx-mi.gx-active{
  background:var(--gx-teal); color:#fff; font-weight:700;
  border-radius:0 18px 18px 0; margin-right:8px;
}
.gx-parent{ font-weight:700; color:#CBD8E8; cursor:default; }
.gx-parent:hover{ background:none; color:#CBD8E8; }
.gx-lv1{ padding-left:28px; }
.gx-lv2{ padding-left:42px; }
.gx-caret{ margin-left:auto; font-size:9px; opacity:.6; }
.gx-divider{ height:1px; background:rgba(255,255,255,.09); margin:6px 12px; }

/* ── Header ── */
.gx-header{
  height:56px; flex-shrink:0; background:#fff;
  border-bottom:1px solid var(--gx-line); box-shadow:0 1px 3px rgba(0,0,0,.04);
  display:flex; align-items:center; gap:10px; padding:0 22px;
  font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
}
.gx-title{ font-size:16px; font-weight:800; color:#1A1A1A; margin:0; }
.gx-crumb{ font-size:12px; color:var(--gx-sub); }
.gx-spacer{ flex:1; }
.gx-status{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px; border:1px solid #BFE7E7; background:#E9F8F8;
  color:#0E8A8A; border-radius:14px; font-size:11px; font-weight:600;
}
.gx-dot{ width:7px; height:7px; border-radius:50%; background:var(--gx-teal); }
.gx-badge{
  display:inline-flex; align-items:center; padding:4px 10px;
  border:1px solid #CBD5E0; background:#F8FAFC; color:var(--gx-sub);
  border-radius:13px; font-size:11px; font-weight:500; white-space:nowrap;
}
.gx-select{
  height:30px; padding:0 10px; border:1px solid #CBD5E0; border-radius:4px;
  font-size:12px; color:var(--gx-ink); background:#fff; cursor:pointer;
  font-family:inherit;
}

/* ── Footer ── */
.gx-footer{
  flex-shrink:0; padding:8px 20px; background:#F0F2F5;
  border-top:1px solid var(--gx-line); text-align:right;
  font-size:10.5px; color:#A0A8B8;
  font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
}

/* ── a11y helper ── */
.gx-sr-only{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* 좁은 화면에서 배지 줄바꿈 방지용 축소 */
@media (max-width:1280px){
  .gx-crumb{ display:none; }
  .gx-badge, .gx-status{ font-size:10px; padding:3px 8px; }
}

/* ── gx-tooltip (지표 설명 툴팁, 11개 페이지 공통) ── */
.gx-tooltip{ cursor:help; }
.gx-tooltip[data-tooltip]{ border-bottom:1px dotted #A7B4CC; }
.gx-tip-bubble{
  position:fixed; display:none; max-width:280px;
  background:#1E3079; color:#fff; padding:8px 11px; border-radius:6px;
  font-size:11px; font-weight:400; line-height:1.55; word-break:keep-all;
  box-shadow:0 6px 18px rgba(30,48,121,.30);
  z-index:99999; pointer-events:none;
  opacity:0; transform:translateY(4px);
  transition:opacity .15s ease, transform .15s ease;
  font-family:'Malgun Gothic','Noto Sans KR',sans-serif;
}
.gx-tip-bubble.gx-tip-show{ opacity:1; transform:translateY(0); }
.gx-tip-bubble::after{
  content:''; position:absolute; left:var(--gx-tip-arrow,20px); top:100%;
  border:5px solid transparent; border-top-color:#1E3079; margin-left:-5px;
}
.gx-tip-bubble.gx-tip-below::after{
  top:auto; bottom:100%; border-top-color:transparent; border-bottom-color:#1E3079; margin-top:-10px;
}

/* ── gx-chat (지표 테이블 검색·조회 챗봇) ── */
.gx-chat-fab{
  position:fixed; right:24px; bottom:24px; width:52px; height:52px; border-radius:50%;
  background:#1E3079; color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:22px; box-shadow:0 4px 14px rgba(30,48,121,.35); cursor:pointer; z-index:9998;
  border:none; transition:transform .15s ease, background .15s ease;
}
.gx-chat-fab:hover{ transform:scale(1.06); background:#17235c; }
.gx-chat-panel{
  position:fixed; right:24px; bottom:88px; width:330px; height:440px;
  background:#fff; border-radius:12px; box-shadow:0 10px 34px rgba(0,0,0,.22);
  display:none; flex-direction:column; overflow:hidden; z-index:9998;
  font-family:'Malgun Gothic','Noto Sans KR',sans-serif; border:1px solid #E2E8F0;
}
.gx-chat-panel.gx-chat-open{ display:flex; }
.gx-chat-header{
  background:#1E3079; color:#fff; padding:12px 14px; font-size:12.5px; font-weight:700;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.gx-chat-header-sub{ font-weight:400; font-size:10.5px; color:#B8C6DB; margin-top:2px; }
.gx-chat-close{ background:none; border:none; color:#fff; font-size:18px; cursor:pointer; line-height:1; padding:2px 4px; }
.gx-chat-body{ flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background:#F5F7FA; }
.gx-chat-msg{ max-width:88%; padding:8px 11px; border-radius:11px; font-size:11.5px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
.gx-chat-msg.bot{ background:#fff; border:1px solid #E2E8F0; color:#354052; align-self:flex-start; border-bottom-left-radius:2px; }
.gx-chat-msg.user{ background:#17B8B8; color:#fff; align-self:flex-end; border-bottom-right-radius:2px; }
.gx-chat-suggest{ display:flex; flex-wrap:wrap; gap:5px; margin-top:2px; }
.gx-chat-suggest-btn{
  background:#EAF1FB; color:#1E3079; border:1px solid #CBD8E8; border-radius:12px;
  padding:4px 9px; font-size:10.5px; cursor:pointer;
}
.gx-chat-suggest-btn:hover{ background:#1E3079; color:#fff; }
.gx-chat-input-row{ display:flex; border-top:1px solid #E2E8F0; padding:8px; gap:6px; background:#fff; flex-shrink:0; }
.gx-chat-input-row input{ flex:1; border:1px solid #CBD5E0; border-radius:6px; padding:7px 9px; font-size:11.5px; font-family:inherit; }
.gx-chat-input-row input:focus{ outline:none; border-color:#17B8B8; }
.gx-chat-input-row button{ background:#1E3079; color:#fff; border:none; border-radius:6px; padding:0 13px; font-size:11.5px; font-weight:600; cursor:pointer; }
.gx-chat-input-row button:hover{ background:#17235c; }

</style>

function vals(s){ return s.trim().split(/\s+/).map(function(t){ return t==='~'?'':t; }); }
function r(label, s, opt){ opt=opt||{}; return {label:label, v:vals(s), ind:!!opt.ind, grp:!!opt.grp, sep:!!opt.sep}; }

/* ── 지표 설명 툴팁 (indicator_info_wireframe.html의 indicators 정의를 요약/재사용) ── */
function escT(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function labelHtml(label, tipMap){
  var tip = tipMap && tipMap[label];
  if(!tip) return label;
  return '<span class="gx-tooltip" data-tooltip="'+escT(tip)+'">'+label+'</span>';
}

/* ── 테이블 렌더 ── */
function renderTable(name, cols, rows, tipMap){
  var flat=[]; cols.forEach(function(c){ c.q.forEach(function(q,i){ flat.push({q:q, first:i===0}); }); });
  var h='<div class="tbl-wrap"><table class="dt"><thead>';
  h+='<tr><th class="lab-h" rowspan="2">'+name+'</th>';
  cols.forEach(function(c,ci){ h+='<th class="yr y'+(ci%2)+' yb" colspan="'+c.q.length+'">'+c.y+'</th>'; });
  h+='</tr><tr>';
  cols.forEach(function(c,ci){ c.q.forEach(function(q,i){ h+='<th class="q y'+(ci%2)+(i===0?' yb':'')+'">'+q+'</th>'; }); });
  h+='</tr></thead><tbody>';
  rows.forEach(function(row,ri){
    var cls=(ri%2?'alt':'')+(row.sep?' sep':'');
    h+='<tr class="'+cls.trim()+'">';
    h+='<td class="lab'+(row.ind?' ind':'')+(row.grp?' grp':'')+'">'+labelHtml(row.label,tipMap)+'</td>';
    row.v.forEach(function(val,i){
      var neg=val.charAt(0)==='-';
      h+='<td class="num'+(neg?' neg':'')+(flat[i]&&flat[i].first?' qb':'')+'">'+val+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

<script>
/* app.js (inlined) */
/* =============================================================
 *  app.js  —  공통 UI(사이드바·헤더·푸터) 주입기
 *  각 페이지 로드 시 config.js(SITE) 값으로 chrome을 다시 그립니다.
 *  → 페이지 HTML을 건드리지 않고 config.js 한 곳만 고치면 전체 반영.
 * ============================================================= */
(function () {
  var S = window.SITE;
  if (!S) { console.error('[app.js] config.js(SITE)를 먼저 로드하세요.'); return; }

  var pageKey = document.body.getAttribute('data-page') || '';
  var meta = S.pages[pageKey] || { title: document.title || '' };

  /* 선택된 제품 (페이지 간 유지) */
  var product = null;
  try { product = localStorage.getItem('bh_product'); } catch (e) {}
  if (!product || S.products.indexOf(product) < 0) product = S.products[0];

  var esc = function (s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  };

  /* ── 사이드바 ── */
  function buildSidebar() {
    var el = document.querySelector('.sidebar');
    if (!el) return;
    el.className = 'gx-sidebar';
    var h = '<div class="gx-logo"><span class="gx-logo-mark">&#128202;</span> 사업건전성</div>';
    h += '<nav class="gx-menu" aria-label="주 메뉴">';
    S.menu.forEach(function (m) {
      if (m.kind === 'divider') { h += '<div class="gx-divider"></div>'; return; }
      var lvl = m.level ? (' gx-lv' + m.level) : '';
      if (m.kind === 'parent') {
        h += '<div class="gx-mi gx-parent' + lvl + '">' + esc(m.label) +
             ' <span class="gx-caret">▾</span></div>';
        return;
      }
      var active = (m.page === pageKey) ? ' gx-active' : '';
      h += '<a class="gx-mi' + lvl + active + '" href="' + esc(m.href) + '"' +
           (active ? ' aria-current="page"' : '') + '>' + esc(m.label) + '</a>';
    });
    h += '</nav>';
    el.innerHTML = h;
  }

  /* ── 헤더 ── */
  function buildHeader() {
    var main = document.querySelector('.main');
    if (!main) return;
    var el = main.querySelector('.header');
    if (!el) { el = document.createElement('div'); main.insertBefore(el, main.firstChild); }
    el.className = 'gx-header';

    var h = '<h1 class="gx-title">' + esc(meta.title) + '</h1>';
    if (meta.crumb) h += '<span class="gx-crumb">' + esc(meta.crumb) + '</span>';
    h += '<div class="gx-spacer"></div>';
    if (S.showStatus) {
      h += '<span class="gx-status"><span class="gx-dot"></span>' + esc(S.statusText) + '</span>';
    }
    h += '<label class="gx-sr-only" for="gx-product">상품 선택</label>';
    h += '<select class="gx-select" id="gx-product">';
    S.products.forEach(function (p) {
      h += '<option' + (p === product ? ' selected' : '') + '>' + esc(p) + '</option>';
    });
    h += '</select>';
    h += '<span class="gx-badge">기준월: ' + esc(S.baseMonth) + '</span>';
    h += '<span class="gx-badge">업데이트: ' + esc(S.updateShort) + '</span>';
    el.innerHTML = h;

    var sel = document.getElementById('gx-product');
    if (sel) sel.addEventListener('change', function () {
      try { localStorage.setItem('bh_product', this.value); } catch (e) {}
      buildFooter();
    });
  }

  /* ── 푸터 ── */
  function buildFooter() {
    var main = document.querySelector('.main');
    if (!main) return;
    var el = main.querySelector('.footer, .gx-footer');
    if (!el) { el = document.createElement('div'); main.appendChild(el); }
    el.className = 'gx-footer';
    var sel = document.getElementById('gx-product');
    var p = sel ? sel.value : product;
    el.innerHTML = '기준: ' + esc(S.baseMonth) + ' &nbsp;|&nbsp; 상품: ' + esc(p) +
                   ' &nbsp;|&nbsp; 업데이트: ' + esc(S.updateFull);
  }

  function run() {
    document.title = (meta.title ? meta.title + ' — ' : '') + '사업건전성';
    buildSidebar();
    buildHeader();
    buildFooter();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else { run(); }
})();

</script>

<script>
/* gx-tooltip engine (11개 페이지 공통, 지표 설명 hover 툴팁) */
(function () {
  var bubble;
  function ensureBubble() {
    if (!bubble) {
      bubble = document.createElement('div');
      bubble.className = 'gx-tip-bubble';
      document.body.appendChild(bubble);
    }
    return bubble;
  }
  function showTip(el) {
    var text = el.getAttribute('data-tooltip');
    if (!text) return;
    var t = ensureBubble();
    t.textContent = text;
    t.style.display = 'block';
    t.classList.remove('gx-tip-show', 'gx-tip-below');
    var r = el.getBoundingClientRect();
    var tw = t.offsetWidth, th = t.offsetHeight;
    var left = r.left + r.width / 2 - tw / 2;
    var top = r.top - th - 10;
    var below = false;
    if (top < 6) { top = r.bottom + 10; below = true; }
    if (left < 6) left = 6;
    if (left + tw > window.innerWidth - 6) left = window.innerWidth - 6 - tw;
    var arrowLeft = Math.max(10, Math.min(tw - 10, r.left + r.width / 2 - left));
    t.style.left = left + 'px';
    t.style.top = top + 'px';
    t.style.setProperty('--gx-tip-arrow', arrowLeft + 'px');
    if (below) t.classList.add('gx-tip-below');
    requestAnimationFrame(function () { t.classList.add('gx-tip-show'); });
  }
  function hideTip() { if (bubble) bubble.classList.remove('gx-tip-show'); }
  document.addEventListener('mouseover', function (e) {
    var el = e.target.closest && e.target.closest('.gx-tooltip[data-tooltip]');
    if (el) showTip(el);
  });
  document.addEventListener('mouseout', function (e) {
    var el = e.target.closest && e.target.closest('.gx-tooltip[data-tooltip]');
    if (el) hideTip();
  });
  document.addEventListener('scroll', hideTip, true);
})();
</script>

<!-- ══════════════ gx-chat: 지표 테이블 검색·조회 챗봇 ══════════════ -->
<button class="gx-chat-fab" id="gxChatFab" title="지표 테이블 검색·조회 챗봇 열기">💬</button>
<div class="gx-chat-panel" id="gxChatPanel">
  <div class="gx-chat-header">
    <div>
      지표 테이블 검색·조회 챗봇
      <div class="gx-chat-header-sub">이 페이지 테이블의 실제 값/정의로 답변합니다</div>
    </div>
    <button class="gx-chat-close" id="gxChatClose" aria-label="닫기">&times;</button>
  </div>
  <div class="gx-chat-body" id="gxChatBody"></div>
  <div class="gx-chat-input-row">
    <input type="text" id="gxChatInput" placeholder="예: MRR Total 2025년 3분기">
    <button id="gxChatSend">전송</button>
  </div>
</div>

<script>
/* =============================================================
 *  gx-chat  —  지표 테이블(indtable) 페이지 규칙 기반 검색·조회 챗봇
 *  - 이 페이지 상단 <script>에 이미 선언된 전역 QCOLS/MCOLS/t1~t5/T1_TIP~T5_TIP 를 그대로 재사용
 *  - 행(지표)명 검색 → 분기/월 조회, 최신값, 최댓값·최솟값, 정의(tipMap) 응답
 * ============================================================= */
(function () {

  function normalize(s) {
    return String(s || '').toLowerCase().replace(/[\s\-_/()%,·]/g, '');
  }

  var TABLES = (typeof t1 !== 'undefined') ? [
    { key: 'growth',        name: '재무 (성장)', cols: QCOLS, rows: t1, tip: T1_TIP },
    { key: 'customercount', name: '재무 (고객)', cols: QCOLS, rows: t2, tip: T2_TIP },
    { key: 'profit',        name: '재무 (수익)', cols: QCOLS, rows: t3, tip: T3_TIP },
    { key: 'customer',      name: '고객',        cols: MCOLS, rows: t4, tip: T4_TIP },
    { key: 'product',       name: '상품',        cols: MCOLS, rows: t5, tip: T5_TIP }
  ] : [];

  function keyFor(y, q) { return y.slice(2) + '-' + q; }
  function flatKeys(cols) {
    var out = [];
    cols.forEach(function (c) { c.q.forEach(function (q) { out.push(keyFor(c.y, q)); }); });
    return out;
  }
  var PERIODS = {};
  TABLES.forEach(function (t) { PERIODS[t.key] = flatKeys(t.cols); });

  function rowSeries(table, row) {
    var periods = PERIODS[table.key];
    var out = {};
    row.v.forEach(function (val, i) {
      if (val !== '' && periods[i]) out[periods[i]] = val;
    });
    return out;
  }

  function findRowMatches(rawQuestion) {
    var n = normalize(rawQuestion);
    var matches = [];
    TABLES.forEach(function (t) {
      t.rows.forEach(function (row) {
        var rn = normalize(row.label);
        if (rn && n.indexOf(rn) !== -1) matches.push({ table: t, row: row });
      });
    });
    matches.sort(function (a, b) { return normalize(b.row.label).length - normalize(a.row.label).length; });
    /* MRR/고객수 키워드로 동명 행(Total/New/Churn 등)의 테이블 모호성 해소 */
    if (matches.length > 1) {
      if (n.indexOf('mrr') !== -1) {
        var f = matches.filter(function (m) { return m.table.key === 'growth'; });
        if (f.length) matches = f;
      } else if (n.indexOf('고객수') !== -1 || n.indexOf('customercount') !== -1) {
        var f2 = matches.filter(function (m) { return m.table.key === 'customercount'; });
        if (f2.length) matches = f2;
      }
    }
    return matches;
  }

  function detectPeriod(q) {
    var m = q.match(/(\d{2,4})\s*년?\s*[.\-]?\s*([1-4])\s*[qQ분기]/);
    var year, quarter;
    if (m) { year = m[1]; quarter = m[2]; }
    else {
      m = q.match(/([1-4])\s*[qQ]\s*['.\-]?\s*(\d{2,4})/);
      if (m) { quarter = m[1]; year = m[2]; }
    }
    if (year && quarter) {
      var yy = year.length >= 4 ? year.slice(2) : (year.length === 1 ? ('0' + year) : year);
      return yy + '-' + quarter + 'Q';
    }
    var mm = q.match(/(\d{1,2})\s*월/);
    if (mm) {
      var month = mm[1].length === 1 ? '0' + mm[1] : mm[1];
      var ym = q.match(/(\d{2,4})\s*년/);
      var yy2 = ym ? (ym[1].length >= 4 ? ym[1].slice(2) : ym[1]) : '24';
      return yy2 + '-' + month + '월';
    }
    return null;
  }

  function parseNum(s) {
    if (!s) return null;
    var v = parseFloat(String(s).replace(/%/g, '').replace(/,/g, ''));
    return isNaN(v) ? null : v;
  }

  function maxMinEntry(seriesObj, wantMax) {
    var best = null, bestP = null;
    Object.keys(seriesObj).forEach(function (p) {
      var v = parseNum(seriesObj[p]);
      if (v === null) return;
      if (best === null || (wantMax ? v > best : v < best)) { best = v; bestP = p; }
    });
    return bestP === null ? null : { period: bestP, value: seriesObj[bestP] };
  }

  function isDefIntent(q) { return /정의|설명|뜻|의미|이\s*뭐|뭐야|뭔가요|뭔지|무엇/.test(q); }
  function isMaxIntent(q) { return /최고|최대|가장\s*높|가장\s*큰/.test(q); }
  function isMinIntent(q) { return /최저|최소|가장\s*낮|가장\s*작/.test(q); }
  function isGreeting(q) { return /^(안녕|hi|hello|헬로|도움|help|뭐.*할.*수|무엇을.*할)/i.test(q.trim()); }

  var HELP_MSG = '안녕하세요! 이 페이지(지표 테이블)의 실제 표에 있는 값으로 답변하는 챗봇이에요.\n이렇게 물어봐 주세요:\n• MRR Total 2025년 3분기\n• 고객수 New 얼마야?\n• Rule of 40이 뭐야?\n• 재구독율 최고치는?';
  var FALLBACK_MSG = '죄송해요, 해당 지표(행)를 표에서 찾지 못했어요. 이렇게 물어봐 주세요:\n• "매출총계 2024년 4분기" (지표+기간)\n• "영업이익 얼마야?" (지표 → 최신값)\n• "Net Promoter Score가 뭐야?" (정의)\n• "% 매출총이익 최고치는?" (최댓값)';

  function answer(q) {
    if (isGreeting(q)) return HELP_MSG;
    if (!TABLES.length) return FALLBACK_MSG;

    var matches = findRowMatches(q);
    if (!matches.length) return FALLBACK_MSG;

    if (isDefIntent(q)) {
      return matches.slice(0, 3).map(function (m) {
        var tip = m.table.tip[m.row.label];
        return '[' + m.table.name + '] ' + m.row.label + ': ' + (tip || '(정의 정보 없음)');
      }).join('\n');
    }

    var period = detectPeriod(q);
    var wantMax = isMaxIntent(q), wantMin = isMinIntent(q);

    var lines = matches.slice(0, 3).map(function (m) {
      var series = rowSeries(m.table, m.row);
      var label = '[' + m.table.name + '] ' + m.row.label;

      if (wantMax || wantMin) {
        var ext = maxMinEntry(series, wantMax);
        if (!ext) return label + ': 표시된 값이 없어요.';
        return label + '의 ' + (wantMax ? '최고치는 ' : '최저치는 ') + ext.period + ' ' + ext.value;
      }
      if (period && series[period] !== undefined) {
        return label + ' (' + period + '): ' + series[period];
      }

      var periodsOrder = PERIODS[m.table.key];
      var latestVal = null, latestP = null;
      for (var i = periodsOrder.length - 1; i >= 0; i--) {
        if (series[periodsOrder[i]] !== undefined) { latestVal = series[periodsOrder[i]]; latestP = periodsOrder[i]; break; }
      }
      if (latestVal === null) return label + ': 표시된 값이 없어요.';
      if (period) return label + '는 ' + period + ' 값이 없어요. 최신 값(' + latestP + '): ' + latestVal;
      return label + ' 최신 값(' + latestP + '): ' + latestVal;
    });
    return lines.join('\n');
  }

  /* ── UI 연결 ── */
  var fab = document.getElementById('gxChatFab');
  var panel = document.getElementById('gxChatPanel');
  var closeBtn = document.getElementById('gxChatClose');
  var body = document.getElementById('gxChatBody');
  var input = document.getElementById('gxChatInput');
  var sendBtn = document.getElementById('gxChatSend');

  var SUGGESTIONS = ['MRR Total 2025년 3분기', '고객수 New 얼마야?', 'Rule of 40이 뭐야?', '재구독율 최고치는?'];

  function addMsg(text, who) {
    var div = document.createElement('div');
    div.className = 'gx-chat-msg ' + who;
    div.textContent = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return div;
  }

  function addSuggestions() {
    var wrap = document.createElement('div');
    wrap.className = 'gx-chat-suggest';
    SUGGESTIONS.forEach(function (s) {
      var b = document.createElement('button');
      b.className = 'gx-chat-suggest-btn';
      b.type = 'button';
      b.textContent = s;
      b.addEventListener('click', function () { handleSend(s); });
      wrap.appendChild(b);
    });
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
  }

  function handleSend(text) {
    var q = (typeof text === 'string' ? text : input.value).trim();
    if (!q) return;
    addMsg(q, 'user');
    input.value = '';
    setTimeout(function () { addMsg(answer(q), 'bot'); }, 150);
  }

  var opened = false;
  fab.addEventListener('click', function () {
    opened = !opened;
    panel.classList.toggle('gx-chat-open', opened);
    if (opened && !body.dataset.inited) {
      body.dataset.inited = '1';
      addMsg(HELP_MSG, 'bot');
      addSuggestions();
    }
    if (opened) input.focus();
  });
  closeBtn.addEventListener('click', function () {
    opened = false;
    panel.classList.remove('gx-chat-open');
  });
  sendBtn.addEventListener('click', function () { handleSend(); });
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') handleSend();
  });
})();
</script>
