  var flat=[]; cols.forEach(function(c){ c.q.forEach(function(q,i){ flat.push({q:q, first:i===0}); }); });

  h+='</tr></thead><tbody>';
  rows.forEach(function(row,ri){
    var cls=(ri%2?'alt':'')+(row.sep?' sep':'');
    h+='<tr class="'+cls.trim()+'">';
    h+='<td class="lab'+(row.ind?' ind':'')+(row.grp?' grp':'')+'">'+row.label+'</td>';

    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

/* ── 필터 toolbar 헬퍼 ── */
function toolbar(selects, excel){
  var h='<div class="tbl-toolbar">';
  selects.forEach(function(opts){
    h+='<select class="sel">';
    opts.forEach(function(o,i){ h+='<option'+(i===0?' selected':'')+'>'+o+'</option>'; });
    h+='</select>';
  });
  if(excel) h+='<button class="excel-btn">&#8681; 엑셀다운로드</button>';
  h+='</div>';
  return h;
}
